<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phillip Perez | REALTOR®</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0d1b2e;
    --deep-blue: #1a2f4e;
    --serhant-blue: #1c3d6e;
    --accent-orange: #c8622a;
    --cream: #f5f0e8;
    --white: #ffffff;
    --muted: rgba(255,255,255,0.55);
    --border: rgba(255,255,255,0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--navy);
    min-height: 100vh;
    font-family: 'DM Sans', sans-serif;
    color: var(--white);
    overflow-x: hidden;
  }

  /* Subtle grid texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .card {
    position: relative;
    z-index: 1;
    max-width: 420px;
    margin: 0 auto;
    padding: 0 0 60px 0;
    animation: fadeUp 0.8s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Hero photo — full bleed top */
  .hero {
    position: relative;
    width: 100%;
    height: 420px;
    overflow: hidden;
  }

  .hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }

  /* Gradient fade into dark */
  .hero::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 60%;
    background: linear-gradient(to bottom, transparent, var(--navy));
  }

  /* Orange accent bar — LV-inspired */
  .accent-bar {
    width: 48px;
    height: 3px;
    background: var(--accent-orange);
    margin: 0 auto 10px auto;
    border-radius: 2px;
  }

  .identity {
    text-align: center;
    padding: 28px 28px 20px;
  }

  .name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.4rem;
    font-weight: 300;
    letter-spacing: 0.04em;
    line-height: 1.1;
    color: var(--white);
    margin-bottom: 8px;
  }

  .name span {
    color: var(--accent-orange);
  }

  .title-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 4px;
  }

  .title {
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .dot-sep {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--accent-orange);
    opacity: 0.7;
  }

  /* CTA Save Contact */
  .save-btn {
    display: block;
    margin: 20px 24px 28px;
    padding: 15px;
    background: var(--serhant-blue);
    border: 1px solid rgba(28,61,110,0.8);
    border-radius: 10px;
    color: var(--white);
    text-align: center;
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  .save-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(200,98,42,0.15), transparent);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .save-btn:hover::before { opacity: 1; }
  .save-btn:hover { border-color: var(--accent-orange); }

  .nhb-btn {
    display: block;
    margin: -16px 24px 28px;
    padding: 15px;
    background: transparent;
    border: 1px solid rgba(200,98,42,0.35);
    border-radius: 10px;
    color: var(--accent-orange);
    text-align: center;
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: all 0.25s ease;
  }

  .nhb-btn:hover {
    background: rgba(200,98,42,0.08);
    border-color: var(--accent-orange);
  }

  .save-btn-icon {
    margin-right: 8px;
    opacity: 0.85;
  }

  /* Links section */
  .section-label {
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 24px 12px;
  }

  .links {
    padding: 0 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 28px;
  }

  .link-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    text-decoration: none;
    color: var(--white);
    transition: all 0.2s ease;
  }

  .link-item:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(200,98,42,0.4);
    transform: translateX(3px);
  }

  .link-icon {
    width: 38px;
    height: 38px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 1.1rem;
  }

  .icon-phone { background: rgba(28,61,110,0.5); }
  .icon-email { background: rgba(200,98,42,0.2); }
  .icon-web   { background: rgba(255,255,255,0.07); }
  .icon-fb    { background: rgba(24,119,242,0.2); }
  .icon-tiktok{ background: rgba(255,255,255,0.07); }

  .link-text { flex: 1; }
  .link-label {
    font-size: 0.65rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 2px;
  }
  .link-value {
    font-size: 0.88rem;
    font-weight: 400;
    color: var(--white);
  }

  .link-arrow {
    opacity: 0.3;
    font-size: 0.75rem;
  }

  /* Divider */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 4px 24px 24px;
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 0 24px;
  }

  .footer-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .footer-sub {
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
  }

  .orange-line {
    width: 32px;
    height: 1px;
    background: var(--accent-orange);
    margin: 12px auto 0;
    opacity: 0.5;
  }
</style>
</head>
